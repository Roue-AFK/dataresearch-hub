<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CodeBuddy Desktop</title>
    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, .35);
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
            --glass: rgba(20, 20, 24, .82);
            --glass-border: rgba(255, 255, 255, .1);
            --text: #e4e4e7;
            --dim: #71717a;
            --radius: 10px
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #0f0f11;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: none
        }

        /* === Screen === */
        #screen {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center
        }

        #screen canvas {
            outline: none
        }

        /* === Floating Toolbar (bottom center, auto-hide) === */
        #toolbar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, .5);
            z-index: 20;
            opacity: 0;
            transition: opacity .3s, transform .3s;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #toolbar.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto
        }

        /* Auto-show on mouse near bottom */
        #hotzone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            z-index: 19
        }

        .tb {
            height: 32px;
            padding: 0 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, .06);
            color: var(--dim);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all .15s;
            white-space: nowrap;
        }

        .tb:hover {
            background: rgba(255, 255, 255, .12);
            color: var(--text)
        }

        .tb:active {
            transform: scale(.95)
        }

        .tb svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .tb.danger:hover {
            color: var(--error)
        }

        /* === Status Toast (top center, auto-hide) === */
        #toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, .4);
            z-index: 20;
            font-size: 12px;
            opacity: 0;
            transition: opacity .35s, transform .35s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        #toast .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background .3s
        }

        #toast .dot.ok {
            background: var(--success)
        }

        #toast .dot.warn {
            background: var(--warning)
        }

        #toast .dot.err {
            background: var(--error)
        }

        /* === Loading Overlay === */
        #loading {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f11;
            transition: opacity .5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none
        }

        .ld {
            display: flex;
            gap: 6px;
            margin-bottom: 16px
        }

        .ld span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: b .6s ease-in-out infinite
        }

        .ld span:nth-child(2) {
            animation-delay: .1s
        }

        .ld span:nth-child(3) {
            animation-delay: .2s
        }

        @keyframes b {

            0%,
            100% {
                transform: translateY(0);
                opacity: .4
            }

            50% {
                transform: translateY(-10px);
                opacity: 1
            }
        }

        #loading p {
            font-size: 13px;
            color: var(--dim)
        }

        .glow {
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .12;
            pointer-events: none
        }

        .g1 {
            top: -80px;
            left: -80px;
            background: var(--accent)
        }

        .g2 {
            bottom: -80px;
            right: -80px;
            background: #8b5cf6
        }

        /* === Disconnect Overlay === */
        #disc {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 15, 17, .88);
            backdrop-filter: blur(10px);
        }

        #disc.show {
            display: flex
        }

        #disc h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px
        }

        #disc p {
            font-size: 13px;
            color: var(--dim);
            margin-bottom: 20px
        }

        #disc button {
            height: 36px;
            padding: 0 22px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: filter .15s;
        }

        #disc button:hover {
            filter: brightness(1.15)
        }

        /* === Cursor restore on move === */
        body.cursor-active {
            cursor: default
        }

        body.cursor-active #screen {
            cursor: default
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading">
        <div class="glow g1"></div>
        <div class="glow g2"></div>
        <div class="ld"><span></span><span></span><span></span></div>
        <p id="loadText">Connecting to desktop…</p>
    </div>

    <!-- VNC Screen -->
    <div id="screen">
        <div id="disc">
            <h2>Disconnected</h2>
            <p id="discMsg">Connection was closed.</p>
            <button id="reconBtn">Reconnect</button>
        </div>
    </div>

    <!-- Hover zone to reveal toolbar -->
    <div id="hotzone"></div>

    <!-- Floating Toolbar -->
    <div id="toolbar">
        <button class="tb danger" id="btnDisc" title="Disconnect">
            <svg viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Disconnect
        </button>
    </div>

    <!-- Status Toast -->
    <div id="toast">
        <div class="dot warn"></div><span id="toastMsg">Connecting…</span>
    </div>

    <script type="module">
        import RFB from './core/rfb.js';

        const $ = s => document.getElementById(s);
        const qs = k => new URLSearchParams(location.search).get(k);

        // Preserve e2b proxy params across all navigations
        const sandboxId = qs('x-cs-sandbox-id') || '';
        const sandboxPort = qs('x-cs-sandbox-port') || '';

        let rfb = null, desktopName = '', toastTimer = null, barTimer = null;

        // Params
        const pw = qs('password') || '';
        const viewOnly = qs('view_only') === 'true';
        const autoReconnect = qs('reconnect') !== 'false';
        const reconDelay = parseInt(qs('reconnect_delay') || '3000', 10);

        function wsUrl() {
            // When accessed via e2b proxy (webview.e2b.xxx), WebSocket must go through
            // the same origin so the proxy can forward it to the sandbox.
            // The proxy routes based on x-cs-sandbox-id/port in the initial HTTP request.
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            let u = proto + '://' + location.host;

            // If via e2b proxy, use the websockify path with proxy params
            if (sandboxId) {
                u += '/websockify?x-cs-sandbox-id=' + encodeURIComponent(sandboxId) + '&x-cs-sandbox-port=' + encodeURIComponent(sandboxPort);
            } else {
                // Direct access (localhost), standard websockify path
                u += '/' + (qs('path') || 'websockify');
            }
            return u;
        }

        // Toast
        function toast(msg, type, duration) {
            $('toastMsg').textContent = msg;
            const d = $('toast').querySelector('.dot');
            d.className = 'dot ' + (type || 'warn');
            $('toast').classList.add('show');
            clearTimeout(toastTimer);
            if (duration !== 0) toastTimer = setTimeout(() => $('toast').classList.remove('show'), duration || 3000);
        }

        // Toolbar auto-show/hide
        function showBar() {
            $('toolbar').classList.add('show');
            clearTimeout(barTimer);
            barTimer = setTimeout(() => $('toolbar').classList.remove('show'), 3000);
        }
        $('hotzone').addEventListener('mouseenter', showBar);
        $('toolbar').addEventListener('mouseenter', () => { clearTimeout(barTimer); $('toolbar').classList.add('show') });
        $('toolbar').addEventListener('mouseleave', () => { barTimer = setTimeout(() => $('toolbar').classList.remove('show'), 1500) });

        // Cursor auto-hide
        let cursorTimer;
        document.addEventListener('mousemove', () => {
            document.body.classList.add('cursor-active');
            clearTimeout(cursorTimer);
            cursorTimer = setTimeout(() => document.body.classList.remove('cursor-active'), 2000);
        });

        function connect() {
            $('loading').classList.remove('hidden');
            $('disc').classList.remove('show');
            toast('Connecting…', 'warn', 0);

            try { rfb = new RFB($('screen'), wsUrl(), { credentials: { password: pw } }) }
            catch (e) { toast('Failed: ' + e.message, 'err', 6000); $('loading').classList.add('hidden'); return }

            rfb.viewOnly = viewOnly;
            rfb.scaleViewport = true;
            rfb.resizeSession = true;

            rfb.addEventListener('connect', () => {
                $('loading').classList.add('hidden');
                toast('Connected' + (desktopName ? ' — ' + desktopName : ''), 'ok', 2000);
            });

            rfb.addEventListener('disconnect', e => {
                if (e.detail.clean) {
                    toast('Disconnected', 'err', 4000);
                    $('discMsg').textContent = 'You have been disconnected.';
                } else {
                    if (autoReconnect) { toast('Reconnecting…', 'warn', 0); setTimeout(connect, reconDelay); return }
                    toast('Connection lost', 'err', 0);
                    $('discMsg').textContent = 'Connection lost unexpectedly.';
                }
                $('loading').classList.add('hidden');
                $('disc').classList.add('show');
            });

            rfb.addEventListener('credentialsrequired', () => {
                const p = prompt('VNC Password:');
                p ? rfb.sendCredentials({ password: p }) : rfb.disconnect();
            });

            rfb.addEventListener('desktopname', e => {
                desktopName = e.detail.name;
                document.title = desktopName + ' — CodeBuddy Desktop';
                toast('Connected — ' + desktopName, 'ok', 2000);
            });
        }

        // Buttons
        $('btnDisc').onclick = () => { if (rfb) rfb.disconnect() };
        $('reconBtn').onclick = connect;

        connect();
    </script>
</body>

</html>
